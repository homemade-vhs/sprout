<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout — Plant Tracker</title>
<meta name="description" content="Track your container garden from seed to harvest.">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">

<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --surface: #252525;
  --surface-hover: #2e2e2e;
  --surface-active: #333;
  --border: #3a3a3a;
  --text: #e0e0e0;
  --text-dim: #999;
  --text-muted: #666;
  --accent: #4ade80;
  --accent-dim: #22c55e;
  --accent-bg: rgba(74, 222, 128, 0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.1);
  --warning: #f59e0b;
  --info: #3b82f6;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --transition: 200ms ease;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

html { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; }
body { min-height: 100dvh; }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font-family: inherit;
  font-size: 0.875rem;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  padding: 0.5rem 1rem;
  transition: background var(--transition), transform var(--transition);
}
button:active { transform: scale(0.97); }

input, select, textarea {
  font-family: inherit;
  font-size: 0.875rem;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.5rem 0.75rem;
  outline: none;
  transition: border-color var(--transition);
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn-primary {
  background: var(--accent);
  color: #111;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-dim); }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface-hover); }

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }

.btn-icon {
  background: none;
  padding: 0.4rem;
  color: var(--text-dim);
  font-size: 1.2rem;
  line-height: 1;
}
.btn-icon:hover { color: var(--text); }

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* --- Header / Nav --- */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
header h1 .logo { font-size: 1.6rem; }

nav {
  display: flex;
  gap: 0.25rem;
}
nav button {
  background: none;
  color: var(--text-dim);
  padding: 0.4rem 0.75rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
}
nav button:hover { color: var(--text); background: var(--surface); }
nav button.active { color: var(--accent); background: var(--accent-bg); }

/* --- Views --- */
.view { display: none; }
.view.active { display: block; }

/* ============================================================
   CARDS / GRID
   ============================================================ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  position: relative;
}
.card:hover { background: var(--surface-hover); transform: translateY(-1px); }

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  margin-bottom: 1rem;
}
.filter-bar select, .filter-bar input {
  min-width: 140px;
}

/* ============================================================
   MODAL / DETAIL VIEW
   ============================================================ */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: start;
  padding: 2rem 1rem;
  overflow-y: auto;
}
.modal-backdrop.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  padding: 1.5rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  position: relative;
}
.modal-close {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
}

/* ============================================================
   TRAY GRID
   ============================================================ */
.tray-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  width: 100%;
}
.tray-cell {
  aspect-ratio: 1;
  border: 2px dashed #333;
  border-radius: var(--radius-sm);
  background: #1e1e1e;
  color: #555;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  text-align: center;
  overflow: hidden;
  padding: 4px;
  min-height: 56px;
}
.tray-cell:hover { border-color: var(--accent); background: #252525; }
.tray-cell.occupied { border-style: solid; color: var(--text); background: var(--surface); }

/* ============================================================
   VARIETY TABLE
   ============================================================ */
.variety-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

/* ============================================================
   FORM
   ============================================================ */
.form-group {
  margin-bottom: 1rem;
}
.form-group label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.25rem;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
}

/* ============================================================
   STAGE BADGES
   ============================================================ */
.stage-badge {
  display: inline-block;
  font-size: 0.75rem;
  padding: 0.15rem 0.5rem;
  border-radius: 99px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.stage-germinating  { background: #854d0e33; color: #fbbf24; }
.stage-seedling     { background: #16653433; color: #4ade80; }
.stage-transplanted { background: #0e7a3333; color: #22c55e; }
.stage-flowering    { background: #86198f33; color: #e879f9; }
.stage-harvesting   { background: #b9171733; color: #f87171; }
.stage-done         { background: #37373733; color: #999; }

/* ============================================================
   WATER INDICATOR
   ============================================================ */
.water-needed {
  position: absolute;
  top: 0.6rem;
  right: 0.6rem;
  width: 10px;
  height: 10px;
  background: var(--danger);
  border-radius: 50%;
  box-shadow: 0 0 4px var(--danger);
}

/* ============================================================
   SETTINGS
   ============================================================ */
.settings-section {
  margin-bottom: 2rem;
}
.settings-section h3 {
  margin-bottom: 0.75rem;
  font-size: 1rem;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-dim);
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
.empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  header { flex-direction: column; gap: 0.75rem; }
  nav { width: 100%; justify-content: center; }
  .card-grid { grid-template-columns: 1fr; }
  .tray-grid { grid-template-columns: repeat(8, 1fr); gap: 3px; }
  .tray-cell { font-size: 0.65rem; min-height: 40px; }
  #tray-section > div:nth-child(2) { grid-template-columns: 1fr !important; }
  .modal { padding: 1rem; }
}

/* ============================================================
   UTILITY
   ============================================================ */
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-sm { gap: 0.5rem; }
.gap-md { gap: 1rem; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.text-dim { color: var(--text-dim); }
.text-sm { font-size: 0.8rem; }
.text-xs { font-size: 0.75rem; }
.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div id="app">
  <!-- ======== HEADER ======== -->
  <header>
    <h1><span class="logo">🌱</span> Sprout</h1>
    <nav id="main-nav">
      <button data-view="dashboard" class="active">Dashboard</button>
      <button data-view="varieties">Varieties</button>
      <button data-view="settings">Settings</button>
    </nav>
  </header>

  <!-- ======== DASHBOARD VIEW ======== -->
  <section id="view-dashboard" class="view active">
    <div class="flex-between mb-2">
      <h2>My Plants</h2>
      <div class="flex gap-sm">
        <button class="btn-primary" id="btn-water-all">💧 Water All</button>
        <button class="btn-primary" id="btn-add-plant">+ Add Plant</button>
      </div>
    </div>

    <!-- Seed Trays (top of dashboard) -->
    <div id="tray-section" class="mb-3">
      <div class="flex-between mb-1">
        <h3>Seed Trays</h3>
        <span class="text-sm text-dim">Click any cell to assign or view</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
        <div>
          <h4 class="text-xs text-dim mb-1">Tray 1</h4>
          <div id="tray-grid-1" class="tray-grid"></div>
        </div>
        <div>
          <h4 class="text-xs text-dim mb-1">Tray 2</h4>
          <div id="tray-grid-2" class="tray-grid"></div>
        </div>
      </div>
      <div id="tray-legend" class="mt-2 text-sm text-dim"></div>
    </div>

    <div class="filter-bar" id="filter-bar">
      <select id="filter-stage"><option value="">All Stages</option></select>
      <select id="filter-category"><option value="">All Categories</option></select>
      <input type="text" id="filter-location" placeholder="Filter by location…">
    </div>
    <div id="plant-grid" class="card-grid"></div>
    <div id="dashboard-empty" class="empty-state hidden">
      <div class="emoji">🌱</div>
      <p>No plants yet — let's get growing!</p>
      <button class="btn-primary" id="btn-add-plant-empty">+ Add Your First Plant</button>
    </div>
  </section>

  <!-- ======== VARIETIES VIEW ======== -->
  <section id="view-varieties" class="view">
    <h2 class="mb-2">Variety Reference</h2>
    <input type="text" id="variety-search" placeholder="Search varieties…" class="mb-2" style="width:100%;max-width:400px">
    <div id="variety-list" class="variety-list"></div>
  </section>

  <!-- ======== SETTINGS VIEW ======== -->
  <section id="view-settings" class="view">
    <h2 class="mb-2">Settings</h2>
    <div class="settings-section">
      <h3>Data Management</h3>
      <div class="flex gap-sm">
        <button class="btn-secondary" id="btn-export">📤 Export JSON</button>
        <button class="btn-secondary" id="btn-import">📥 Import JSON</button>
      </div>
      <input type="file" id="import-file" accept=".json" class="hidden">
    </div>
    <div class="settings-section">
      <h3>About</h3>
      <p class="text-sm text-dim">Sprout v1.0 — Track your container garden from seed to harvest.<br>All data stored locally in your browser.</p>
    </div>
  </section>
</div>

<!-- ======== ADD PLANT MODAL ======== -->
<div class="modal-backdrop" id="modal-add">
  <div class="modal">
    <button class="btn-icon modal-close" onclick="closeModal('modal-add')">✕</button>
    <h2 class="mb-2">Add Plant</h2>
    <form id="form-add-plant">
      <div class="form-group">
        <label for="add-variety">Variety</label>
        <select id="add-variety" required></select>
      </div>
      <div class="form-group">
        <label for="add-location">Location</label>
        <input type="text" id="add-location" placeholder="e.g. Tray cell A1, Balcony pot 1" required>
      </div>
      <div class="form-group">
        <label for="add-count">How many?</label>
        <input type="number" id="add-count" min="1" max="80" value="1">
      </div>
      <div class="form-group">
        <label for="add-date">Planted Date</label>
        <input type="date" id="add-date">
      </div>
      <button type="submit" class="btn-primary" style="width:100%">🌱 Plant!</button>
    </form>
  </div>
</div>

<!-- ======== PLANT DETAIL MODAL ======== -->
<div class="modal-backdrop" id="modal-detail">
  <div class="modal" id="detail-content">
    <!-- populated dynamically -->
  </div>
</div>

<!-- ======== TRAY CELL MODAL ======== -->
<div class="modal-backdrop" id="modal-tray-cell">
  <div class="modal" id="tray-cell-content">
    <!-- populated dynamically -->
  </div>
</div>

let state = { plants: [], varieties: [], settings: {} };

// ---- Storage helpers ----
function loadState() {

    if (raw) {
      state = JSON.parse(raw);
      // Ensure varieties are up-to-date (merge any new defaults)
      const existingIds = new Set(state.varieties.map(v => v.id));
      for (const dv of DEFAULT_VARIETIES) {
        if (!existingIds.has(dv.id)) state.varieties.push(structuredClone(dv));
      }
    } else {
      state = { plants: [], varieties: structuredClone(DEFAULT_VARIETIES), settings: {} };
      saveState();
    }
  } catch (e) {
    console.error('Failed to load state:', e);
    state = { plants: [], varieties: structuredClone(DEFAULT_VARIETIES), settings: {} };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ---- ID generation ----
function newId() {
  return crypto.randomUUID();
}

// ---- Variety helpers ----
function getVariety(varietyId) {
  return state.varieties.find(v => v.id === varietyId) || DEFAULT_VARIETIES.find(v => v.id === varietyId);
}

function varietyFullName(v) {
  if (!v) return 'Unknown';
  return v.type ? `${v.type} ${v.name}` : v.name;
}

// ---- Plant helpers ----
function createPlant(varietyId, location, plantedDate) {
  return {
    id: newId(),
    varietyId,
    location,
    stage: 'germinating',
    plantedDate: plantedDate || new Date().toISOString().slice(0, 10),
    sproutedDate: null,
    transplantedDate: null,
    firstHarvestDate: null,
    waterings: [],
    notes: '',
    photos: []
  };
}

function addPlant(plant) {
  state.plants.push(plant);
  saveState();
}

function updatePlant(id, updates) {
  const idx = state.plants.findIndex(p => p.id === id);
  if (idx !== -1) {
    Object.assign(state.plants[idx], updates);
    saveState();
  }
}

function deletePlant(id) {
  state.plants = state.plants.filter(p => p.id !== id);
  saveState();
}

function getPlant(id) {
  return state.plants.find(p => p.id === id);
}

function waterPlant(id, note = '') {
  const plant = getPlant(id);
  if (plant) {
    plant.waterings.push({ date: new Date().toISOString(), note });
    saveState();
  }
}

function advanceStage(id) {
  const plant = getPlant(id);
  if (!plant) return;
  const idx = STAGES.indexOf(plant.stage);
  if (idx < STAGES.length - 1) {
    plant.stage = STAGES[idx + 1];
    const now = new Date().toISOString().slice(0, 10);
    if (plant.stage === 'seedling') plant.sproutedDate = now;
    else if (plant.stage === 'transplanted') plant.transplantedDate = now;
    else if (plant.stage === 'harvesting') plant.firstHarvestDate = now;
    saveState();
  }
}

// ---- Date helpers ----
function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
}

function daysBetween(a, b) {
  return Math.floor((new Date(b) - new Date(a)) / 86400000);
}

function needsWater(plant) {
  const variety = getVariety(plant.varietyId);
  if (!variety || plant.stage === 'done') return false;
  if (plant.waterings.length === 0) return true;
  const lastWatering = plant.waterings[plant.waterings.length - 1].date;
  return daysSince(lastWatering.slice(0, 10)) >= variety.waterFrequencyDays;
}

function getExpectedMilestone(plant) {
  const variety = getVariety(plant.varietyId);
  if (!variety) return null;
  const planted = new Date(plant.plantedDate);
  const today = new Date();

  if (plant.stage === 'germinating') {
    const expectedSprout = new Date(planted);
    expectedSprout.setDate(expectedSprout.getDate() + variety.germinationDays[1]);
    const daysLeft = Math.ceil((expectedSprout - today) / 86400000);
    return { label: 'Sprout expected', days: daysLeft };
  }
  if (plant.stage === 'seedling' && variety.trayToPotWeeks) {
    const sprout = new Date(plant.sproutedDate || plant.plantedDate);
    const expectedTransplant = new Date(sprout);
    expectedTransplant.setDate(expectedTransplant.getDate() + variety.trayToPotWeeks[1] * 7);
    const daysLeft = Math.ceil((expectedTransplant - today) / 86400000);
    return { label: 'Transplant ready', days: daysLeft };
  }
  if (['transplanted', 'flowering'].includes(plant.stage)) {
    const fromDate = new Date(variety.harvestFrom === 'transplant'
      ? (plant.transplantedDate || plant.plantedDate)
      : (plant.sproutedDate || plant.plantedDate));
    const expectedHarvest = new Date(fromDate);
    expectedHarvest.setDate(expectedHarvest.getDate() + variety.daysToHarvest[1]);
    const daysLeft = Math.ceil((expectedHarvest - today) / 86400000);
    return { label: 'Harvest expected', days: daysLeft };
  }
  return null;
}

function lastWateredText(plant) {
  if (plant.waterings.length === 0) return 'Never';
  const d = daysSince(plant.waterings[plant.waterings.length - 1].date.slice(0, 10));
  if (d === 0) return 'Today';
  if (d === 1) return 'Yesterday';
  return `${d} days ago`;
}

// ---- Export / Import ----
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sprout-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.plants && imported.varieties) {
        state = imported;
        saveState();
        switchView('dashboard');
        alert('Data imported successfully!');
      } else {
        alert('Invalid Sprout data file.');
      }
    } catch {
      alert('Failed to parse JSON file.');
    }
  };
  reader.readAsText(file);
}

// ---- Navigation ----
function switchView(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
  const view = document.getElementById(`view-${viewName}`);
  if (view) view.classList.add('active');
  const navBtn = document.querySelector(`#main-nav button[data-view="${viewName}"]`);
  if (navBtn) navBtn.classList.add('active');
  // Render view
  if (viewName === 'dashboard') renderDashboard();

  else if (viewName === 'varieties') renderVarieties();
  else if (viewName === 'settings') renderSettings();
}

// ---- Modal helpers ----
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// ---- Render: Dashboard ----
function renderDashboard() {
  const grid = document.getElementById('plant-grid');
  const empty = document.getElementById('dashboard-empty');
  populateFilterDropdowns();

  const filtered = getFilteredPlants();

  if (state.plants.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');

    if (filtered.length === 0) {
      grid.innerHTML = '<p class="text-dim" style="grid-column:1/-1;text-align:center;padding:2rem">No plants match the current filters.</p>';
    } else {
      grid.innerHTML = filtered.map(plant => {
    const variety = getVariety(plant.varietyId);
    const vName = variety?.name || 'Unknown';
    const vType = variety?.type || '';
    const catEmoji = variety ? (CATEGORIES[variety.category]?.charAt(0) || '') : '';
    const milestone = getExpectedMilestone(plant);
    const water = needsWater(plant);
    const daysPlanted = daysSince(plant.plantedDate);

    return `<div class="card" data-plant-id="${plant.id}">
      ${water ? '<div class="water-needed" title="Needs water!"></div>' : ''}
      <div class="flex-between mb-1">
        <strong>${catEmoji} ${vName}</strong>
        <span class="stage-badge stage-${plant.stage}">${STAGE_LABELS[plant.stage]}</span>
      </div>
      ${vType ? `<div class="text-xs text-dim">${escHtml(vType)}</div>` : ''}
      <div class="text-sm text-dim">📍 ${escHtml(plant.location)}</div>
      <div class="text-sm text-dim mt-1">🌱 Planted ${daysPlanted} day${daysPlanted !== 1 ? 's' : ''} ago</div>
      ${milestone ? `<div class="text-sm mt-1" style="color:${milestone.days <= 0 ? 'var(--accent)' : 'var(--text-dim)'}">⏱ ${milestone.label}: ${milestone.days <= 0 ? 'now!' : milestone.days + ' days'}</div>` : ''}
      <div class="text-sm text-dim mt-1">💧 Watered: ${lastWateredText(plant)}</div>
    </div>`;
  }).join('');

  // Click handler for cards
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openPlantDetail(card.dataset.plantId));
  });
    }
  }

  // Always render trays on the dashboard
  renderTray();
}

function getFilteredPlants() {
  const stageFilter = document.getElementById('filter-stage').value;
  const catFilter = document.getElementById('filter-category').value;
  const locFilter = document.getElementById('filter-location').value.toLowerCase().trim();

  return state.plants.filter(p => {
    if (stageFilter && p.stage !== stageFilter) return false;
    if (catFilter) {
      const v = getVariety(p.varietyId);
      if (!v || v.category !== catFilter) return false;
    }
    if (locFilter && !p.location.toLowerCase().includes(locFilter)) return false;
    return true;
  });
}

function populateFilterDropdowns() {
  const stageSelect = document.getElementById('filter-stage');
  const catSelect = document.getElementById('filter-category');
  const curStage = stageSelect.value;
  const curCat = catSelect.value;

  stageSelect.innerHTML = '<option value="">All Stages</option>' +
    STAGES.map(s => `<option value="${s}" ${s === curStage ? 'selected' : ''}>${STAGE_LABELS[s]}</option>`).join('');

  catSelect.innerHTML = '<option value="">All Categories</option>' +
    Object.entries(CATEGORIES).map(([k, v]) => `<option value="${k}" ${k === curCat ? 'selected' : ''}>${v}</option>`).join('');
}

// ---- Render: Add Plant Form ----
function populateAddForm() {
  const sel = document.getElementById('add-variety');
  sel.innerHTML = state.varieties.map(v => `<option value="${v.id}">${varietyFullName(v)}</option>`).join('');
  document.getElementById('add-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('add-count').value = '1';
  document.getElementById('add-location').value = '';
}

function handleAddPlant(e) {
  e.preventDefault();
  const varietyId = document.getElementById('add-variety').value;
  const baseLocation = document.getElementById('add-location').value.trim();
  const count = Math.max(1, Math.min(80, parseInt(document.getElementById('add-count').value) || 1));
  const date = document.getElementById('add-date').value;

  if (!varietyId || !baseLocation) return;

  for (let i = 0; i < count; i++) {
    const loc = count > 1 ? `${baseLocation} ${i + 1}` : baseLocation;
    const plant = createPlant(varietyId, loc, date);
    addPlant(plant);
  }

  closeModal('modal-add');
  renderDashboard();
}

          }).join('')

// ---- Stage revert ----
function revertStage(id) {
  const plant = getPlant(id);
  if (!plant) return;
  const idx = STAGES.indexOf(plant.stage);
  if (idx > 0) {
    const oldStage = plant.stage;
    plant.stage = STAGES[idx - 1];
    // Clear date stamps for the stage we just left
    if (oldStage === 'seedling') plant.sproutedDate = null;
    if (oldStage === 'transplanted') plant.transplantedDate = null;
    if (oldStage === 'harvesting') plant.firstHarvestDate = null;
    saveState();
  }
}

// ---- Image compression ----
function compressImage(file, maxKB) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        const MAX_DIM = 1200;
        if (width > MAX_DIM || height > MAX_DIM) {
          const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.8;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        // Reduce quality until under maxKB
        while (dataUrl.length > maxKB * 1024 * 1.37 && quality > 0.1) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---- Render: Tray View (inline on dashboard) ----
function renderTray() {
  const grid1 = document.getElementById('tray-grid-1');
  const grid2 = document.getElementById('tray-grid-2');
  const legend = document.getElementById('tray-legend');
  if (!grid1 || !grid2) return;

  // Build a map: "T1-A1" or "T2-B3" -> plant
  const trayPlants = {};
  state.plants.forEach(p => {
    const m = p.location.match(/tray\s*(\d)\s*cell\s*(.+)/i);
    if (m) {
      const key = `T${m[1]}-${m[2].trim().toUpperCase()}`;
      trayPlants[key] = p;
    }
  });

  const rows = 'ABCDE';
  const cols = 8;

  function buildTrayHtml(trayNum) {
    let html = '';
    for (let r = 0; r < rows.length; r++) {
      for (let c = 1; c <= cols; c++) {
        const cellLabel = `${rows[r]}${c}`;
        const key = `T${trayNum}-${cellLabel}`;
        const plant = trayPlants[key];
        if (plant) {
          const variety = getVariety(plant.varietyId);
          const catColor = getCategoryColor(variety?.category);
          const stageColor = getStageColor(plant.stage);
          html += `<div class="tray-cell occupied" style="border-color:${stageColor};background:${catColor}22" data-tray-cell="${cellLabel}" data-tray-num="${trayNum}" title="${varietyFullName(variety)} — ${STAGE_LABELS[plant.stage]}">
            <span>${variety?.name || '?'}<br><span style="font-size:0.6rem">${cellLabel}</span></span>
          </div>`;
        } else {
          html += `<div class="tray-cell" data-tray-cell="${cellLabel}" data-tray-num="${trayNum}"><span class="text-muted">${cellLabel}</span></div>`;
        }
      }
    }
    return html;
  }

  grid1.innerHTML = buildTrayHtml(1);
  grid2.innerHTML = buildTrayHtml(2);

  // Legend
  legend.innerHTML = `
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center">
      <span>Stages: </span>
      ${STAGES.filter(s => s !== 'done').map(s => `<span><span style="display:inline-block;width:10px;height:10px;background:${getStageColor(s)};border-radius:50%;margin-right:4px"></span>${STAGE_LABELS[s]}</span>`).join('')}
    </div>
  `;

  // Click handlers via event delegation
  [grid1, grid2].forEach(grid => {
    grid.onclick = (e) => {
      const cell = e.target.closest('.tray-cell');
      if (cell) openTrayCellModal(cell.dataset.trayCell, parseInt(cell.dataset.trayNum));
    };
  });
}

function getStageColor(stage) {
  const colors = { germinating: '#fbbf24', seedling: '#4ade80', transplanted: '#22c55e', flowering: '#e879f9', harvesting: '#f87171', done: '#999' };
  return colors[stage] || '#999';
}

function getCategoryColor(cat) {
  const colors = { fruiting_veg: '#ef4444', leafy_green: '#22c55e', herb: '#4ade80', root: '#f59e0b' };
  return colors[cat] || '#666';
}

  const content = document.getElementById('tray-cell-content');
  const fullLabel = `Tray ${trayNum} cell ${cellLabel}`;

    return m && parseInt(m[1]) === trayNum && m[2].trim().toUpperCase() === cellLabel;

      <p><span class="stage-badge stage-${plant.stage}">${STAGE_LABELS[plant.stage]}</span></p>
      <p class="text-sm text-dim mt-1">Planted ${daysSince(plant.plantedDate)} days ago • 💧 ${lastWateredText(plant)}</p>
      <div class="flex gap-sm mt-2">
        <button class="btn-primary" id="tray-cell-detail">View Detail</button>
        <button class="btn-secondary" id="tray-cell-water">💧 Water</button>
        <button class="btn-danger" id="tray-cell-remove">Remove from Tray</button>
      </div>
    `;
    content.querySelector('#tray-cell-detail')?.addEventListener('click', () => {
      closeModal('modal-tray-cell');
      openPlantDetail(plant.id);
    });

      closeModal('modal-tray-cell');

    });

      if (confirm('Remove this plant from the tray? (The plant record will remain, but its location will be cleared.)')) {
        updatePlant(plant.id, { location: 'Unassigned' });
        closeModal('modal-tray-cell');
        renderDashboard();
      }
    });
  } else {
    // Empty cell — offer to assign a plant
    const unassigned = state.plants.filter(p => {
      const loc = p.location.toLowerCase();
      return p.stage === 'germinating' && !loc.startsWith('tray cell');
    });
    content.innerHTML = `
      <button class="btn-icon modal-close" onclick="closeModal('modal-tray-cell')">✕</button>
      <h2>Tray ${trayNum} — Cell ${cellLabel}</h2>
      <p class="text-dim mt-1">This cell is empty.</p>
      ${unassigned.length > 0 ? `
        <div class="form-group mt-2">
          <label>Assign a plant:</label>
          <select id="tray-cell-assign-select">
            ${unassigned.map(p => {
              const v = getVariety(p.varietyId);
              return `<option value="${p.id}">${varietyFullName(v)} (${escHtml(p.location)})</option>`;
            }).join('')}
          </select>
        </div>
        <button class="btn-primary mt-1" id="tray-cell-assign">Assign to Tray ${trayNum} ${cellLabel}</button>
      ` : `
        <p class="text-sm text-dim mt-2">No unassigned germinating plants to place here.<br>Add a plant first from the Dashboard.</p>
      `}
    `;
    content.querySelector('#tray-cell-assign')?.addEventListener('click', () => {
      const plantId = document.getElementById('tray-cell-assign-select').value;
      if (plantId) {
        updatePlant(plantId, { location: `Tray ${trayNum} cell ${cellLabel}` });
        closeModal('modal-tray-cell');
        renderDashboard();
      }
    });
  }

  openModal('modal-tray-cell');
}
// ---- Render: Varieties Reference ----
function renderVarieties() {
  const list = document.getElementById('variety-list');
  const search = (document.getElementById('variety-search')?.value || '').toLowerCase().trim();
  const filtered = state.varieties.filter(v => !search || v.name.toLowerCase().includes(search) || (v.type && v.type.toLowerCase().includes(search)) || v.category.includes(search));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">📚</div><p>No varieties match your search.</p></div>';
    return;
  }

  list.innerHTML = filtered.map(v => {
    const preGerm = v.preGermMethod ? v.preGermMethod.replace(/_/g, ' ') : 'None';
    const trayToPot = v.trayToPotWeeks ? `${v.trayToPotWeeks[0]}–${v.trayToPotWeeks[1]} weeks` : 'N/A (direct sow)';
    return `<div class="card" style="cursor:default">
      <div class="flex-between">
        <strong>${CATEGORIES[v.category]?.charAt(0) || ''} ${escHtml(v.name)}</strong>${v.type ? ` <span class="text-sm text-dim">${escHtml(v.type)}</span>` : ''}
        <span class="text-xs text-dim">${v.season === 'warm' ? '☀️ Warm season' : v.season === 'cool' ? '❄️ Cool season' : '🌤 Either'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.25rem 1rem;margin-top:0.5rem" class="text-sm">
        <div><span class="text-dim">Start:</span> ${v.startMethod === 'tray' ? '🌱 Tray' : '🌿 Direct sow'}</div>
        <div><span class="text-dim">Depth:</span> ${v.plantDepth}</div>
        <div><span class="text-dim">Germination:</span> ${v.germinationDays[0]}–${v.germinationDays[1]} days</div>
        <div><span class="text-dim">Pre-germ:</span> ${preGerm}</div>
        <div><span class="text-dim">Tray to pot:</span> ${trayToPot}</div>
        <div><span class="text-dim">Pot size:</span> ${v.potSizeGallons} gal</div>
        <div><span class="text-dim">Days to harvest:</span> ${v.daysToHarvest[0]}–${v.daysToHarvest[1]}</div>
        <div><span class="text-dim">Harvest from:</span> ${v.harvestFrom}</div>
        <div><span class="text-dim">Water every:</span> ${v.waterFrequencyDays} day${v.waterFrequencyDays !== 1 ? 's' : ''}</div>
        <div><span class="text-dim">Sun:</span> ${v.sunHours}+ hours</div>
      </div>
      ${v.tips.length > 0 ? `<div class="mt-1 text-sm" style="color:var(--accent)">💡 ${v.tips.map(t => escHtml(t)).join(' • ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ---- Render: Settings ----
function renderSettings() {
  // Settings view is mostly static HTML; just ensure counts are shown
  const plantCount = state.plants.length;
  const varietyCount = state.varieties.length;
  const storageSize = new Blob([JSON.stringify(state)]).size;
  const sizeStr = storageSize > 1024 * 1024
    ? (storageSize / 1024 / 1024).toFixed(1) + ' MB'
    : (storageSize / 1024).toFixed(1) + ' KB';

  // Add stats below the about section if not already present
  let statsEl = document.getElementById('settings-stats');
  if (!statsEl) {
    statsEl = document.createElement('div');
    statsEl.id = 'settings-stats';
    statsEl.className = 'settings-section';
    document.getElementById('view-settings').appendChild(statsEl);
  }
  statsEl.innerHTML = `
    <h3>Stats</h3>
    <div class="text-sm text-dim">
      <p>🌱 ${plantCount} plant${plantCount !== 1 ? 's' : ''} tracked</p>
      <p>📚 ${varietyCount} varieties in database</p>
      <p>💾 ${sizeStr} used in localStorage</p>
    </div>
  `;
}

// ---- Utility ----
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Event listeners ----
function initEvents() {
  // Nav
  document.querySelectorAll('#main-nav button').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  // Add plant buttons
  document.getElementById('btn-add-plant')?.addEventListener('click', () => {
    populateAddForm();
    openModal('modal-add');
  });
  document.getElementById('btn-add-plant-empty')?.addEventListener('click', () => {
    populateAddForm();
    openModal('modal-add');
  });

  // Add plant form submit
  document.getElementById('form-add-plant')?.addEventListener('submit', handleAddPlant);

  // Filters
  document.getElementById('filter-stage')?.addEventListener('change', renderDashboard);
  document.getElementById('filter-category')?.addEventListener('change', renderDashboard);
  document.getElementById('filter-location')?.addEventListener('input', renderDashboard);

  // Water all
  document.getElementById('btn-water-all')?.addEventListener('click', () => {
    const thirsty = state.plants.filter(p => needsWater(p) && p.stage !== 'done');
    if (thirsty.length === 0) {
      alert('All plants are well-watered! 🌿');
      return;
    }
    if (confirm(`Water ${thirsty.length} plant${thirsty.length > 1 ? 's' : ''} now?`)) {
      thirsty.forEach(p => waterPlant(p.id));
      renderDashboard();
    }
  });

  // Export / Import
  document.getElementById('btn-export')?.addEventListener('click', exportData);
  document.getElementById('btn-import')?.addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file')?.addEventListener('change', (e) => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  });

  // Variety search
  document.getElementById('variety-search')?.addEventListener('input', renderVarieties);

  // Close modals on backdrop click
  document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) backdrop.classList.remove('active');
    });
  });

  // Close modals on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop.active').forEach(m => m.classList.remove('active'));
    }
  });
}

// ---- Init ----
function init() {
  loadState();
  initEvents();
  switchView('dashboard');

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
